
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>取りもれ～ぬ Ver142</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;}
#map{height:100vh;background:#eee;}
.panel{position:absolute;top:10px;left:10px;background:#fff;padding:10px;z-index:1000;border-radius:8px;}
button{margin:4px;}
</style>
</head>
<body>

<div class="panel">
<button onclick="openPicker()">Driveから地点CSV</button>
<button onclick="openRoutePicker()">Driveからルート</button>
<div id="status">未読込</div>
</div>

<div id="map"></div>

<script>
// ===== Google設定 =====
const developerKey = 'YOUR_API_KEY';
const clientId = 'YOUR_CLIENT_ID';
const scope = ['https://www.googleapis.com/auth/drive.readonly'];

let pickerApiLoaded=false;
let oauthToken;

// ===== 初期化 =====
function loadApis(){
  gapi.load('auth', {'callback': onAuth});
  gapi.load('picker', {'callback': ()=>pickerApiLoaded=true});
}

function onAuth(){
  gapi.auth.authorize({
    client_id:clientId,
    scope:scope,
    immediate:false
  },res=>{
    if(res && !res.error){
      oauthToken=res.access_token;
    }
  });
}

// ===== Picker =====
function openPicker(){
  loadApis();
  setTimeout(()=>createPicker("point"),500);
}

function openRoutePicker(){
  loadApis();
  setTimeout(()=>createPicker("route"),500);
}

function createPicker(type){
  if(!pickerApiLoaded || !oauthToken){
    alert("認証未完了");
    return;
  }

  const view=new google.picker.View(google.picker.ViewId.DOCS);
  view.setMimeTypes("text/csv,application/json");

  const picker=new google.picker.PickerBuilder()
    .addView(view)
    .setOAuthToken(oauthToken)
    .setDeveloperKey(developerKey)
    .setCallback(data=>pickerCallback(data,type))
    .build();

  picker.setVisible(true);
}

// ===== ファイル取得 =====
function pickerCallback(data,type){
  if(data.action==="picked"){
    const file=data.docs[0];
    fetchFile(file.id,type);
  }
}

function fetchFile(fileId,type){
  fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
    headers:{Authorization:`Bearer ${oauthToken}`}
  })
  .then(r=>r.text())
  .then(text=>{
    if(type==="point"){
      parseCSV(text);
    }else{
      document.getElementById("status").innerText="ルート読込OK";
    }
  });
}

// ===== CSV解析 =====
function parseCSV(text){
  Papa.parse(text,{
    header:true,
    complete:(res)=>{
      document.getElementById("status").innerText=
        "地点読込:"+res.data.length+"件";
    }
  });
}
</script>

</body>
</html>
